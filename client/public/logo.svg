<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- Background -->
  <rect width="200" height="200" fill="#15803d" rx="36"/>

  <!-- ── Ground line ── -->
  <rect x="0" y="148" width="200" height="52" fill="#166534" rx="0"/>
  <rect x="0" y="148" width="200" height="6" fill="#14532d"/>

  <!-- ── Exhaust pipe ── -->
  <rect x="68" y="58" width="8" height="28" rx="4" fill="#374151"/>
  <!-- smoke puffs -->
  <circle cx="72" cy="52" r="5"  fill="#d1d5db" opacity="0.7"/>
  <circle cx="76" cy="44" r="4"  fill="#e5e7eb" opacity="0.5"/>
  <circle cx="70" cy="37" r="3"  fill="#f3f4f6" opacity="0.35"/>

  <!-- ── Tractor body (hood) ── -->
  <path d="M 62 86 L 62 108 L 130 108 L 130 78 L 92 78 L 82 86 Z" fill="#dc2626"/>
  <!-- hood top taper -->
  <path d="M 82 86 L 92 78 L 130 78 L 130 86 Z" fill="#b91c1c"/>

  <!-- ── Cabin ── -->
  <rect x="110" y="68" width="52" height="40" rx="4" fill="#dc2626"/>
  <!-- cabin roof -->
  <rect x="106" y="62" width="60" height="10" rx="5" fill="#b91c1c"/>
  <!-- windows -->
  <rect x="116" y="74" width="18" height="16" rx="3" fill="#bfdbfe" opacity="0.9"/>
  <rect x="138" y="74" width="16" height="16" rx="3" fill="#bfdbfe" opacity="0.9"/>
  <!-- window glare -->
  <line x1="117" y1="75" x2="120" y2="80" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="139" y1="75" x2="142" y2="80" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- ── Chassis / base ── -->
  <rect x="58" y="106" width="112" height="14" rx="4" fill="#991b1b"/>

  <!-- ── Big rear wheel ── -->
  <circle cx="90"  cy="148" r="34" fill="#1f2937"/>
  <circle cx="90"  cy="148" r="27" fill="#374151"/>
  <circle cx="90"  cy="148" r="10" fill="#6b7280"/>
  <circle cx="90"  cy="148" r="5"  fill="#d1d5db"/>
  <!-- tyre treads rear -->
  <line x1="90" y1="114" x2="90" y2="121" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="175" x2="90" y2="182" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <line x1="56"  y1="148" x2="63"  y2="148" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <line x1="117" y1="148" x2="124" y2="148" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <line x1="67"  y1="125" x2="72"  y2="130" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <line x1="108" y1="166" x2="113" y2="171" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <line x1="113" y1="125" x2="108" y2="130" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <line x1="72"  y1="166" x2="67"  y2="171" stroke="#111827" stroke-width="3" stroke-linecap="round"/>

  <!-- ── Small front wheel ── -->
  <circle cx="155" cy="148" r="20" fill="#1f2937"/>
  <circle cx="155" cy="148" r="14" fill="#374151"/>
  <circle cx="155" cy="148" r="5"  fill="#6b7280"/>
  <circle cx="155" cy="148" r="2.5" fill="#d1d5db"/>
  <!-- tyre treads front -->
  <line x1="155" y1="128" x2="155" y2="133" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="155" y1="163" x2="155" y2="168" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="135" y1="148" x2="140" y2="148" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="148" x2="175" y2="148" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Headlight ── -->
  <circle cx="62" cy="100" r="5" fill="#fde68a"/>
  <circle cx="62" cy="100" r="3" fill="#fbbf24"/>

  <!-- ── Sun ── -->
  <circle cx="170" cy="34" r="14" fill="#fbbf24"/>
  <line x1="170" y1="14" x2="170" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="184" y1="20" x2="187" y2="17" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="190" y1="34" x2="194" y2="34" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="184" y1="48" x2="187" y2="51" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="156" y1="20" x2="153" y2="17" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Tiny crops on ground ── -->
  <line x1="24" y1="148" x2="24" y2="136" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="24" cy="133" rx="5" ry="7" fill="#22c55e"/>
  <line x1="36" y1="148" x2="36" y2="138" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="36" cy="135" rx="4" ry="6" fill="#16a34a"/>

</svg>
