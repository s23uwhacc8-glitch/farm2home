<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#22c55e"/>
  
  <!-- Farm barn/house -->
  <path d="M 20 40 L 20 28 L 32 20 L 44 28 L 44 40 Z" fill="#8b4513" stroke="#654321" stroke-width="1"/>
  <path d="M 18 40 L 32 26 L 46 40 Z" fill="#dc2626" stroke="#991b1b" stroke-width="1"/>
  
  <!-- Door -->
  <rect x="28" y="34" width="8" height="6" fill="#654321"/>
  
  <!-- Windows -->
  <rect x="23" y="32" width="4" height="4" fill="#fef3c7" stroke="#654321" stroke-width="0.5"/>
  <rect x="37" y="32" width="4" height="4" fill="#fef3c7" stroke="#654321" stroke-width="0.5"/>
  
  <!-- Leaf decoration -->
  <ellipse cx="16" cy="18" rx="3" ry="5" fill="#15803d" transform="rotate(-30 16 18)"/>
  <ellipse cx="48" cy="18" rx="3" ry="5" fill="#15803d" transform="rotate(30 48 18)"/>
  
  <!-- Small crops/plants at bottom -->
  <line x1="14" y1="47" x2="14" y2="43" stroke="#15803d" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="48" x2="18" y2="45" stroke="#15803d" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="47" x2="46" y2="43" stroke="#15803d" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="48" x2="50" y2="45" stroke="#15803d" stroke-width="2" stroke-linecap="round"/>
</svg>
